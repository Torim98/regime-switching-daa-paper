services:
  data-service:
    build:
      context: .
      dockerfile: services/data_service/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - TZ=Europe/Berlin

  model-service:
    build:
      context: .
      dockerfile: services/model_service/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./assets:/app/assets
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - TZ=Europe/Berlin
    depends_on:
      - data-service
    command: uvicorn services.model_service.main:app --host 0.0.0.0 --port 8002 --timeout-keep-alive 28800

  backtest-service:
    build:
      context: .
      dockerfile: services/backtest_service/Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
      - ./docs:/app/docs
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - TZ=Europe/Berlin
    depends_on:
      - model-service

  dashboard-service:
    build:
      context: .
      dockerfile: services/dashboard_service/Dockerfile
    # Dev-only Binding: nur von localhost erreichbar, nicht ins Netz exponiert
    ports:
      - "127.0.0.1:8004:8004"
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
      - ./docs:/app/docs
      - ./config:/app/config
      - ./logs:/app/logs
      - ./models:/app/models  # read-only Zugriff auf Optuna-DB für /api/optuna/best-params
    environment:
      - PYTHONPATH=/app
      - TZ=Europe/Berlin
      - DATA_SERVICE_URL=http://data-service:8001
      - MODEL_SERVICE_URL=http://model-service:8002
      - BACKTEST_SERVICE_URL=http://backtest-service:8003
    depends_on:
      - data-service
      - model-service
      - backtest-service