labels:
  supervised_label_source: "pagan_sossounov"   # "hmm" | "pagan_sossounov" | "peak_to_trough"
  pagan_sossounov:
    window_months: 8
    min_phase_months: 4
    min_cycle_months: 16
    amplitude_threshold: 0.20
  peak_to_trough:
    threshold: 0.20

## --- Pipeline Execution ---
pipeline:
  notebooks:
    - "00_dependencies.ipynb"
    - "01_data_preprocessing.ipynb"
    - "02_feature_engineering.ipynb"
    - "03_regime_switching_models.ipynb"
    - "04_backtesting.ipynb"
    - "05_evaluation.ipynb"
    - "99_statistics_md.ipynb"
    
## --- Fast Mode (Development) ---
fast_mode:
  enabled: false
  overrides:
    lstm_epochs: 10
    transformer_epochs: 10
    mcs_n_paths: 100
    walk_forward_test_window_months: 12   # größere Folds = weniger Folds = schneller
    walk_forward_step_months: 12
 
 ## --- Model Persistence ---
model_persistence:
  enabled: true                  # true = Modelle laden statt trainieren (falls vorhanden)
  models_dir: "../models"        # Ablageort für persistierte Modelle
  files:
    msm: "msm_regime_model.pkl"
    hmm: "hmm_regime_model.pkl"
    scaler_hmm: "hmm_scaler.pkl"
    lstm: "lstm_regime_model.keras"
    scaler_lstm: "lstm_scaler.pkl"
    transformer: "transformer_regime_model.pt"
    scaler_transformer: "transformer_scaler.pkl"
    optuna_db: "optuna_studies.db"