# ============================================================================
# Central Configuration — Regime-Switching DAA Pipeline
# ============================================================================
# Single source of truth for all pipeline parameters.
# Changes here propagate to all notebooks via config_loader.py.
# ============================================================================

# --- Dependencies (00_dependencies) ---
dependencies:
  install_on_run: false   # true = pip install bei jedem Pipeline-Lauf, false = überspringen
  nbstripout: false        # true = nbstripout Git-Filter aktivieren (stripped Notebook-Outputs bei git add), muss nur einmalig auf true gesetzt werden (Git-Filter bleibt persistent)

# --- Data Ingestion (01_data_preprocessing) ---
data:
  tickers:
    - "^GSPC"       # S&P 500
    - "VUSTX"       # Long-Term US Treasury Bonds (Vanguard)
    - "^VIX"        # CBOE Volatility Index
    - "^IRX"        # 3-Month Treasury Bill Rate (Cash proxy)
    - "^TNX"        # 10-Year Treasury Note Yield
  start_date: "1990-01-02"
  # end_date:
  #   - null (oder Feld leer lassen)  -> dynamisch = heute (rolling mode)
  #   - "YYYY-MM-DD"                  -> fester Cutoff (thesis-freeze mode, inklusiv)
  end_date: "2026-04-17"

# --- Feature Engineering (02_feature_engineering) ---
features:
  sma_window: 200
  volatility_window: 20
  momentum_window: 10
  model_features:
    - "Returns"
    - "Vol_20"
    - "Distance_SMA"
    - "Momentum"
    - "VIX"
    - "Yield_Spread"

# --- Portfolio Allocation ---
portfolio:
  weight_equity: 0.6    # S&P 500
  weight_bonds: 0.4     # VUSTX

# --- Model Hyperparameters (03_regime_switching_models) ---
models:
  msm:
    k_regimes: 2
    switching_variance: true
    threshold: 0.35   # Basis für die anderen Modelle; Bear-Signal wenn Prob >= threshold; Initialwert der Thesis 0.5
    train_test_split: &msm_train_test_split 0.8  # 0.8, wird nur bei walk_forward.enabled: false genutzt
  hmm:
    features:
      - "Returns"
      - "VIX"
      - "Yield_Spread"
    n_components: 2
    covariance_type: "full"     # Intitialwert der Thesis "full"
    n_iter: 1000
    random_state: 42
    threshold: 0.5              # Bear-Signal wenn Prob >= threshold; Initialwert der Thesis 0.5
    train_test_split: *msm_train_test_split  # 0.8, wird nur bei walk_forward.enabled: false genutzt
  lstm:
    window_size: 120            # Initialwert der Thesis 60
    train_test_split: *msm_train_test_split  # 0.8, wird nur bei walk_forward.enabled: false genutzt
    units_l1: 16                # Initialwert der Thesis 32
    units_l2: 128               # Initialwert der Thesis 64
    return_sequences: true
    epochs: 40                  # Initialwert der Thesis 30
    batch_size: 32
    learning_rate: 0.00012536386810872734        # Initialwert der Thesis 0.001
    dropout: 0.1                # Initialwert der Thesis 0.2
    dense: 1
    activation: "sigmoid"
    optimizer: "adam"
    metrics: "accuracy"
    validation_split: 0.1
    verbose: 1
    threshold: 0.3              # Bear-Signal wenn Prob >= threshold
  transformer:
    # --- Data ---
    window_size: 120             # Gleiche Sequenzlänge wie LSTM; Initialwert der Thesis 60
    train_test_split: *msm_train_test_split  # 0.8, wird nur bei walk_forward.enabled: false genutzt
    # --- Architektur ---
    d_model: 64                  # Embedding-Dimension (Transformer interne Dimension); Initialwert der Thesis 64
    n_heads: 8                   # Anzahl Attention-Heads (d_model muss durch n_heads teilbar sein!); Initialwert der Thesis 4
    n_layers: 3                  # Anzahl Transformer-Encoder-Layer; Initialwert der Thesis 2
    dim_feedforward: 64          # Dimension des Feed-Forward-Netzwerks im Encoder; Initialwert der Thesis 128
    dropout: 0.25                # Dropout-Rate (Regularisierung); Initialwert der Thesis 0.1
    # --- Training ---
    epochs: 20                   # Initialwert der Thesis 50
    batch_size: 32
    learning_rate: 0.000031476320331974455       # Initialwert der Thesis 0.0001
    validation_split: 0.1
    verbose: 1
    # --- Signal ---
    threshold: 0.45              # Bear-Signal wenn Prob >= threshold
     # --- Class Balancing ---
    pos_weight_auto: true           # Automatische Gewichtung für Bear-Klasse

# --- Walk-Forward-Validierung (03_regime_switching_models) ---
walk_forward:
  enabled: true                   # false = Fallback auf alten 80/20-Split
  mode: "rolling"                  # "rolling" oder "expanding"
  train_window_years: 10           # Länge des Train-Fensters (nur bei rolling)
  test_window_months: 12           # Länge je OOS-Fold
  step_months: 12                  # Schrittweite (= test_window für nicht-überlappende Folds)
  min_train_years: 10              # Mindest-Trainingsdatenmenge im ersten Fold (expanding)
  retrain_dl: true                 # LSTM/Transformer in jedem Fold neu trainieren
  retrain_msm_hmm: true            # MSM/HMM in jedem Fold neu trainieren
  cache_enabled: true
  n_jobs: -1                        # -1 = alle CPUs, 1 = sequentiell (Debug), int = feste Anzahl
  dl_warm_start: true
  dl_warm_start_epochs: 10

# --- Backtesting (04_backtesting) ---
## --- Hyperparameter-Optimierung (Optuna) ---
optimization:
  enabled: false                    # Setze enabled: true wenn du Optuna laufen lassen willst, false wenn du die gefundenen Params bereits in der Config hast und nur noch den finalen WF-Lauf machst.
  metric: "sharpe"                  # Optimierungsziel: "sharpe", "sortino", "calmar"
  models:
    - "MSM"
    - "HMM"
    - "LSTM"
    - "Transformer"
  # Trials pro Modell — ökonometrische Modelle sind günstig (50 Trials),
  # DL-Modelle teurer (30 Trials). Analog every_nth_fold: DL subsampelt stärker.
  n_trials_per_model:
    MSM: 50
    HMM: 50
    LSTM: 30
    Transformer: 30
  every_nth_fold_per_model:
    MSM: 2
    HMM: 2
    LSTM: 5
    Transformer: 5
  storage: "sqlite:///models/optuna_studies.db"   # Optional: Persistieren der Optuna-DB

backtesting:
  transaction_cost_bps: 10    # Basis points (10 = 0.1%)
  signal_shift: 1             # T+1 shift for look-ahead bias prevention
  sorr:
    scenarios:
      Standard:
        initial_capital: 500000.00
        annual_withdrawal_rate: 0.06     # 2500€/Monat ÷ 500000€ × 12 = 0.06
        liquidity_fee: 0.001
      Aggressive:
        initial_capital: 500000.00
        annual_withdrawal_rate: 0.096    # 4000€/Monat ÷ 500000€ × 12 = 0.096
        liquidity_fee: 0.001
      Low_Capital:
        initial_capital: 300000.00
        annual_withdrawal_rate: 0.08     # 2000€/Monat ÷ 300000€ × 12 = 0.08
        liquidity_fee: 0.001

# --- Evaluation / MCS (05_evaluation) ---
evaluation:
  mcs:
    n_paths: 10000
    block_length: 20
    random_seed: 42
    sim_years: 10
    trading_days_per_year: 252
  # --- Issue #13: Extended Evaluation (Kap. 4.1–4.4) ---
  extended:
    nber_source: "fred_csv"         # "fred_csv" | "local"
    f1_models: ["MSM", "HMM", "LSTM", "Transformer"]
    whipsaw_min_phase_days: 5
    threshold_grid:
      MSM:         [0.25, 0.30, 0.35, 0.40, 0.50]
      HMM:         [0.40, 0.45, 0.50, 0.55, 0.60]
      LSTM:        [0.20, 0.30, 0.40, 0.50]
      Transformer: [0.30, 0.40, 0.45, 0.50, 0.60]
    fee_grid_bps: [0, 5, 10, 20, 30, 50, 75, 100, 150, 200]
    withdrawal_rates: [0.035, 0.04, 0.05]
    ttr_min_dd: -0.05               # nur Drawdowns < −5 %
    alpha: 0.05                     # Signifikanzniveau (Kap. 1.5)
    hypothesis_scenario: "Aggressive"   # MCS-Szenario fuer H1/H2-Tests
    crisis_windows:
      GFC:   ["2007-10-01", "2009-03-31"]
      COVID: ["2020-02-01", "2020-04-30"]
      "2022": ["2022-01-01", "2022-10-31"]

## --- Plotting ---
plotting:
  colors:
    MSM: "tab:blue"
    HMM: "tab:purple"
    LSTM: "tab:green"
    Transformer: "darkorange"
    Buy_Hold: "gray"

