# ============================================================================
# Central Configuration — Regime-Switching DAA Pipeline
# ============================================================================
# Single source of truth for all pipeline parameters.
# Changes here propagate to all notebooks via config_loader.py.
# ============================================================================

# --- Dependencies (00_dependencies) ---
dependencies:
  install_on_run: false   # true = pip install bei jedem Pipeline-Lauf, false = überspringen
  nbstripout: false        # true = nbstripout Git-Filter aktivieren (stripped Notebook-Outputs bei git add), muss nur einmalig auf true gesetzt werden (Git-Filter bleibt persistent

# --- Data Ingestion (01_data_preprocessing) ---
data:
  tickers:
    - "^GSPC"       # S&P 500
    - "VUSTX"       # Long-Term US Treasury Bonds (Vanguard)
    - "^VIX"        # CBOE Volatility Index
    - "^IRX"        # 3-Month Treasury Bill Rate (Cash proxy)
    - "^TNX"        # 10-Year Treasury Note Yield
  start_date: "1990-01-02"
  end_date: null    # null = dynamic (today)

# --- Feature Engineering (02_feature_engineering) ---
features:
  sma_window: 200
  volatility_window: 20
  momentum_window: 10
  model_features:
    - "Returns"
    - "Vol_20"
    - "Distance_SMA"
    - "Momentum"
    - "VIX"
    - "Yield_Spread"

# --- Portfolio Allocation ---
portfolio:
  weight_equity: 0.6    # S&P 500
  weight_bonds: 0.4     # VUSTX

# --- Model Hyperparameters (03_regime_switching_models) ---
models:
  msm:
    k_regimes: 2
    switching_variance: true
    threshold: &threshold 0.5   # Basis für die anderen Modelle; Bear-Signal wenn Prob >= threshold
  hmm:
    features:
      - "Returns"
      - "VIX"
      - "Yield_Spread"
    n_components: 2
    covariance_type: "full"
    n_iter: 1000
    random_state: 42
    threshold: *threshold       # Deckt sich mit den anderen Modellen; Bear-Signal wenn Prob >= threshold
  lstm:
    window_size: &lstm_window 30
    train_test_split: &lstm_train_test_split 0.8
    labels: "MSM_Signal"
    units: 64
    return_sequences: true
    epochs: 30
    batch_size: 32
    learning_rate: 0.001
    dropout: 0.2
    dense: 1
    activation: "sigmoid"
    optimizer: "adam"
    loss: "binary_crossentropy"
    metrics: "accuracy"
    validation_split: 0.1
    verbose: 1
    threshold: *threshold       # Deckt sich mit den anderen Modellen; Bear-Signal wenn Prob >= threshold
  transformer:
    # --- Data ---
    window_size: *lstm_window                      # Gleiche Sequenzlänge wie LSTM (30)
    train_test_split: *lstm_train_test_split       # 80/20 wie LSTM
    labels: "MSM_Signal"                 # Supervised auf Markov-Labels (wie LSTM)
    # --- Architektur ---
    d_model: 64                  # Embedding-Dimension (Transformer interne Dimension)
    n_heads: 4                   # Anzahl Attention-Heads (d_model muss durch n_heads teilbar sein!)
    n_layers: 2                  # Anzahl Transformer-Encoder-Layer
    dim_feedforward: 128         # Dimension des Feed-Forward-Netzwerks im Encoder
    dropout: 0.1                 # Dropout-Rate (Regularisierung)
    # --- Training ---
    epochs: 50
    batch_size: 32
    learning_rate: 0.0001
    validation_split: 0.1
    verbose: 1
    # --- Signal ---
    threshold: *threshold       # Deckt sich mit den anderen Modellen; Bear-Signal wenn Prob >= threshold
     # --- Class Balancing ---
    pos_weight_auto: true           # Automatische Gewichtung für Bear-Klasse

# --- Backtesting (04_backtesting) ---
backtesting:
  transaction_cost_bps: 10    # Basis points (10 = 0.1%)
  signal_shift: 1             # T+1 shift for look-ahead bias prevention
  sorr:
    scenarios:
      Standard:
        initial_capital: 500000.00
        annual_withdrawal_rate: 0.06     # 2500€/Monat ÷ 500000€ × 12 = 0.06
        liquidity_fee: 0.001
      Aggressive:
        initial_capital: 500000.00
        annual_withdrawal_rate: 0.096    # 4000€/Monat ÷ 500000€ × 12 = 0.096
        liquidity_fee: 0.001
      Low_Capital:
        initial_capital: 300000.00
        annual_withdrawal_rate: 0.08     # 2000€/Monat ÷ 300000€ × 12 = 0.08
        liquidity_fee: 0.001

# --- Evaluation / MCS (05_evaluation) ---
evaluation:
  mcs:
    n_paths: 1000
    block_length: 20
    random_seed: 42
    sim_years: 10
    trading_days_per_year: 252

## --- Plotting ---
plotting:
  colors:
    MSM: "tab:blue"
    HMM: "tab:purple"
    LSTM: "tab:green"
    Transformer: "darkorange"
    Buy_Hold: "gray"

## --- File Paths ---
paths:
  data_dir: "../data"
  assets_dir: "../assets"
  docs_dir: "../docs"
  logs_dir: "../logs"
  files:
    preprocessed: "01_preprocessed_data.parquet"
    feature_engineered: "02_feature_engineered_data.parquet"
    test_data: "03_test_df_data.parquet"
    backtesting_results: "04_backtesting_results_data.parquet"
    backtesting_costs: "04_backtesting_transaction_costs_data.parquet"
    backtesting_sorr: "04_backtesting_sorr_simulation.parquet"
    mcs_data: "05_mcs_data.parquet"
  assets:
    eda_descriptive_stats: "eda_descriptive_stats.md"
    eda_adf_tests: "eda_adf_tests.md"
    eda_volatility_clusters: "eda_volatility_clusters.png"
    eda_historical_drawdowns: "eda_historical_drawdowns.png"
    equity_curves: "equity_curves.png"
    capital_curve: "capital_curve.png"
    transaction_costs: "transaction_costs.png"
    sorr_sim_standard: "sorr_sim_standard.png"
    sorr_sim_aggressive: "sorr_sim_aggressive.png"
    sorr_sim_low_capital: "sorr_sim_low_capital.png"
    evaluation_table: "evaluation_table.md"
    performance_summary: "performance_summary.md"
    mcs_summary: "mcs_summary.md"
    sorr_summary: "sorr_summary.md"
    mcs_paths: "mcs_paths.png"
    mcs_boxplot_standard: "mcs_boxplot_standard.png"
    mcs_boxplot_aggressive: "mcs_boxplot_aggressive.png"
    mcs_boxplot_low_capital: "mcs_boxplot_low_capital.png"
    mcs_quantiles: "mcs_quantiles.png"
    markov_model: "msm_regimes.png"
    hmm_regimes: "hmm_regimes.png"
    lstm_model: "lstm_model.png"
    transformer_model: "transformer_model.png"
    regime_comparison: "regime_comparison.png"
    statistics_output: "../docs/statistics.md"
    pipeline_timing: "pipeline_timing.md"

## --- Pipeline Execution ---
pipeline:
  notebooks:
    - "00_dependencies.ipynb"
    - "01_data_preprocessing.ipynb"
    - "02_feature_engineering.ipynb"
    - "03_regime_switching_models.ipynb"
    - "04_backtesting.ipynb"
    - "05_evaluation.ipynb"
    - "99_statistics_md.ipynb"
    
## --- Fast Mode (Development) ---
fast_mode:
  enabled: false
  overrides:
    lstm_epochs: 10
    transformer_epochs: 10
    mcs_n_paths: 100
 
 ## --- Model Persistence ---
model_persistence:
  enabled: true                  # true = Modelle laden statt trainieren (falls vorhanden)
  models_dir: "../models"        # Ablageort für persistierte Modelle
  files:
    msm: "msm_regime_model.pkl"
    hmm: "hmm_regime_model.pkl"
    scaler_hmm: "hmm_scaler.pkl"
    lstm: "lstm_regime_model.keras"
    scaler_lstm: "lstm_scaler.pkl"
    transformer: "transformer_regime_model.pt"